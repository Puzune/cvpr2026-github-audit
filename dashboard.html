<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CVPR 2026 GitHub Audit</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #1f2328;
      --muted: #667085;
      --muted-2: #8a94a6;
      --line: #d7dde8;
      --line-soft: #e8edf5;
      --accent: #0b63ce;
      --accent-2: #0f766e;
      --ok: #16833a;
      --warn: #9a5b00;
      --bad: #bd2532;
      --shadow: 0 8px 22px rgba(16, 24, 40, 0.07);
      --content-max: 1680px;
    }
    * { box-sizing: border-box; min-width: 0; }
    html, body { max-width: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      font: 13px/1.45 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(180deg, #eaf1fb 0, var(--bg) 220px),
        var(--bg);
      color: var(--text);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(244, 247, 251, 0.94);
      border-bottom: 1px solid var(--line);
      padding: 16px 18px 12px;
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 760;
      letter-spacing: 0;
    }
    header > h1,
    header > .stats,
    header > .controls,
    header > .progressbar {
      max-width: var(--content-max);
      margin-left: auto;
      margin-right: auto;
    }
    header > h1 { margin-bottom: 10px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px 8px;
      min-height: 58px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
    }
    .stat::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: var(--accent);
    }
    .stat:nth-child(2)::before { background: var(--ok); }
    .stat:nth-child(3)::before { background: var(--warn); }
    .stat .label { color: var(--muted); font-size: 12px; }
    .stat .value { font-size: 21px; font-weight: 760; margin-top: 2px; letter-spacing: 0; }
    .stat .hint {
      color: var(--muted-2);
      font-size: 11px;
      line-height: 1.25;
      margin-top: 2px;
      overflow-wrap: anywhere;
    }
    .stat:nth-child(2) .value { color: var(--ok); }
    .stat:nth-child(3) .value { color: var(--warn); }
    .controls {
      display: grid;
      grid-template-columns: minmax(260px, 1.6fr) repeat(7, minmax(108px, 1fr)) auto auto;
      gap: 9px;
      align-items: end;
      padding: 10px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
      line-height: 1;
    }
    input, select, button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      padding: 0 11px;
      font: inherit;
      outline: none;
      transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }
    input:focus, select:focus, button:focus-visible {
      border-color: #84b6f4;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.14);
    }
    button {
      cursor: pointer;
      color: #fff;
      border-color: var(--accent);
      background: var(--accent);
      font-weight: 600;
    }
    button:hover { background: #0858bd; }
    button.secondary {
      color: var(--accent);
      border-color: #c7d7ee;
      background: #f7fbff;
    }
    button.secondary:hover { background: #eaf3ff; }
    button.ghost {
      color: var(--muted);
      border-color: var(--line);
      background: #fff;
    }
    button.ghost:hover { color: var(--text); background: #f7f9fc; }
    main {
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 14px 18px 28px;
    }
    .srOnly {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .resultBar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 0 0 10px;
    }
    .meta {
      color: var(--muted);
      margin: 0;
      font-size: 12px;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .viewChips {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 24px;
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      white-space: nowrap;
    }
    .moreRow { text-align: center; background: #fbfdff; }
    .moreRow button { min-width: 180px; }
    .tableWrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0;
      background: transparent;
    }
    th, td {
      border-bottom: 1px solid var(--line-soft);
      padding: 9px 10px;
      vertical-align: top;
      text-align: left;
    }
    th {
      background: #eef3f9;
      color: #344054;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    tbody tr { transition: background 120ms ease; }
    tbody tr:hover { background: #f8fbff; }
    tr:last-child td { border-bottom: 0; }
    .pid { color: var(--muted); font-variant-numeric: tabular-nums; }
    .title { width: auto; }
    .repo { overflow-wrap: anywhere; }
    .colPid { width: 3.4%; }
    .colType { width: 5%; }
    .colTitle { width: auto; }
    .colStatus { width: 8%; }
    .colRepo { width: 34%; }
    .repoHeader,
    .repoItem {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 76px 132px;
      gap: 10px;
      align-items: baseline;
    }
    .repoHeader span:nth-child(2),
    .repoHeader span:nth-child(3) {
      text-align: right;
    }
    .repoItem + .repoItem { margin-top: 5px; }
    .repoMeta {
      display: none;
    }
    .repoStars {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      white-space: nowrap;
    }
    .repoSource {
      color: var(--muted);
      white-space: nowrap;
      text-align: right;
    }
    .stars { font-variant-numeric: tabular-nums; text-align: right; }
    .source { color: var(--muted); }
    .title .small {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    a:hover { text-decoration: underline; }
    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 12px;
      white-space: nowrap;
      border: 1px solid var(--line);
      background: #fff;
      line-height: 1.45;
    }
    .github_found { color: var(--ok); border-color: #9ed9ad; background: #edf9f1; }
    .checking, .pending, .needs_title_search { color: var(--warn); border-color: #efd083; background: #fff8df; }
    .not_found_in_checked_sources, .not_found { color: var(--bad); border-color: #f4adb5; background: #fff1f3; }
    .oral { color: #7b3fc6; border-color: #d8c8ff; background: #f6f0ff; }
    .poster { color: #075ba8; border-color: #b6d7ff; background: #eef7ff; }
    .dim { color: var(--muted); }
    .small { font-size: 12px; }
    .reviewNote {
      margin-top: 4px;
      max-width: 22ch;
      color: #667085;
      overflow-wrap: anywhere;
      line-height: 1.35;
    }
    .abstract {
      margin-top: 6px;
      color: var(--muted);
      max-width: 78ch;
    }
    .abstract summary {
      cursor: pointer;
      color: #344054;
      font-weight: 600;
      font-size: 12px;
    }
    .abstract summary:hover { color: var(--accent); }
    .abstract div {
      margin-top: 4px;
      overflow-wrap: anywhere;
      color: #4b5565;
    }
    .progressbar {
      width: 100%;
      height: 7px;
      background: #e4eaf3;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }
    .progressbar div {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 200ms ease;
    }
    @media (max-width: 1180px) {
      header { position: static; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stat { min-width: 0; }
      .stat .value {
        font-size: 18px;
        overflow-wrap: anywhere;
      }
      .controls { grid-template-columns: 1fr 1fr; }
      .field:first-child { grid-column: 1 / -1; }
      main { padding-left: 8px; padding-right: 8px; }
      .meta { overflow-wrap: anywhere; }
      .resultBar {
        display: block;
      }
      .viewChips {
        justify-content: flex-start;
        margin-top: 8px;
      }
      .tableWrap {
        background: transparent;
        border: 0;
        box-shadow: none;
      }
      table {
        display: block;
        border: 0;
        background: transparent;
      }
      thead {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }
      tbody { display: block; }
      tr {
        display: block;
        width: 100%;
        max-width: 100%;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        margin: 0 0 10px;
        padding: 8px 10px;
        box-shadow: 0 1px 4px rgba(16, 24, 40, 0.05);
      }
      td {
        display: block;
        width: 100%;
        max-width: 100%;
        border-bottom: 0;
        padding: 5px 0;
      }
      td::before {
        content: attr(data-label);
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        margin-bottom: 2px;
      }
      .pid,
      .paperType,
      .status,
      .source,
      .stars,
      .repo,
      .title {
        width: auto;
        min-width: 0;
        max-width: none;
        text-align: left;
      }
      .stars { font-size: 14px; }
      .repo { overflow-wrap: anywhere; }
      .repoItem {
        grid-template-columns: minmax(0, 1fr) 58px 112px;
        gap: 6px;
      }
      .title,
      .title * {
        overflow-wrap: anywhere;
        word-break: normal;
      }
      .abstract { max-width: none; }
      .repo,
      .repo * {
        overflow-wrap: anywhere;
        word-break: break-all;
      }
      .badge { margin-bottom: 2px; }
    }
    @media (max-width: 760px) {
      body { font-size: 13px; }
      header {
        width: 100%;
        max-width: 100%;
        padding: 12px 10px 10px;
      }
      main {
        width: 100%;
        max-width: 100%;
      }
      h1 { font-size: 17px; }
      .stats {
        grid-template-columns: 1fr;
        gap: 7px;
      }
      .stat { min-height: 48px; padding: 7px 8px 6px; }
      .stat .value { font-size: 16px; }
      input, select, button { width: 100%; }
      .controls { grid-template-columns: 1fr; }
      .field:first-child { grid-column: auto; }
    }
  </style>
</head>
<body>
  <header>
    <h1>CVPR 2026 GitHub 开源统计</h1>
    <div class="stats">
      <div class="stat"><div class="label">论文总数</div><div class="value" id="total">0</div><div class="hint">CVPR 页面解析出的论文条目</div></div>
      <div class="stat"><div class="label">已核对论文数</div><div class="value" id="checked">0</div><div class="hint">已完成当前严格 GitHub 核对</div></div>
      <div class="stat"><div class="label">剩余待核对论文数</div><div class="value" id="remaining">0</div><div class="hint">仍需继续搜索或复核</div></div>
    </div>
    <form class="controls" role="search" onsubmit="return false;">
      <label class="field" for="filter"><span>关键词</span><input id="filter" aria-label="关键词" placeholder="搜索标题、作者、摘要、GitHub"></label>
      <label class="field" for="searchScope"><span>范围</span><select id="searchScope" aria-label="搜索范围">
        <option value="all">全文</option>
        <option value="title">标题</option>
        <option value="abstract">摘要</option>
        <option value="authors">作者</option>
        <option value="affiliations">单位</option>
        <option value="paper_id">PaperID</option>
      </select></label>
      <label class="field" for="searchMode"><span>匹配</span><select id="searchMode" aria-label="关键词匹配方式">
        <option value="all">全部关键词</option>
        <option value="any">任一关键词</option>
        <option value="exact">精确短语</option>
      </select></label>
      <label class="field" for="sort"><span>排序</span><select id="sort" aria-label="排序">
        <option value="paper_id">PaperID</option>
        <option value="title">标题</option>
        <option value="stars_desc">Stars 降序（仓库级）</option>
        <option value="stars_asc">Stars 升序（仓库级）</option>
        <option value="status">状态</option>
        <option value="type">类型</option>
        <option value="repo_count">仓库数量</option>
        <option value="pushed_desc">最近更新</option>
      </select></label>
      <label class="field" for="typeFilter"><span>类型</span><select id="typeFilter" aria-label="论文类型"></select></label>
      <label class="field" for="statusFilter"><span>状态</span><select id="statusFilter" aria-label="开源状态"></select></label>
      <label class="field" for="confidenceFilter"><span>置信度</span><select id="confidenceFilter" aria-label="置信度"></select></label>
      <label class="field" for="renderCount"><span>显示</span><select id="renderCount" aria-label="每次渲染行数">
        <option value="auto">自动</option>
        <option value="100">100 行</option>
        <option value="500">500 行</option>
        <option value="1000">1,000 行</option>
        <option value="2000">2,000 行</option>
        <option value="all">全部</option>
      </select></label>
      <button id="refresh" class="secondary" type="button">刷新</button>
      <button id="clearFilters" class="ghost" type="button">清空</button>
    </form>
    <div class="progressbar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="已核对论文占论文总数比例"><div id="bar"></div></div>
  </header>
  <main>
    <div class="resultBar">
      <p class="meta" id="meta" aria-live="polite">等待结果文件生成...</p>
      <div class="viewChips" id="visibleStats"></div>
    </div>
    <div class="tableWrap">
      <table>
        <caption class="srOnly">CVPR 2026 论文 GitHub 开源统计结果</caption>
        <colgroup>
          <col class="colPid">
          <col class="colType">
          <col class="colTitle">
          <col class="colStatus">
          <col class="colRepo">
        </colgroup>
        <thead>
          <tr>
            <th class="pid" scope="col">ID</th>
            <th class="paperType" scope="col">类型</th>
            <th class="title" scope="col">标题</th>
            <th class="status" scope="col">状态</th>
            <th class="repo" scope="col"><div class="repoHeader"><span>GitHub</span><span>Stars</span><span>证据源</span></div></th>
          </tr>
        </thead>
        <tbody id="body"></tbody>
      </table>
    </div>
  </main>
  <script>
    let rows = [];
    let progress = {};
    let loading = false;
    let renderLimit = 0;
    let lastViewSignature = "";
    let lastResultsKey = "";
    let lastResultsFetchAt = 0;
    let lastProgressKey = "";
    let filterTimer = 0;
    let pollTimer = 0;
    let repoUseCounts = new Map();

    const RENDER_LIMIT_KEY = "cvpr2026.githubAudit.renderCount";
    const RESULT_REFRESH_MS = 60000;
    const POLL_MS = 3000;
    const el = id => document.getElementById(id);
    const fmt = n => Number.isFinite(Number(n)) ? Number(n).toLocaleString() : "0";
    const esc = value => String(value ?? "").replace(/[&<>"']/g, ch => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#39;"
    }[ch]));
    const prettyMath = value => String(value ?? "")
      .replace(/\\Omega/g, "Ω")
      .replace(/\\omega/g, "ω")
      .replace(/Ω/g, "Ω")
      .replace(/\$+/g, "");
    const searchVariants = value => {
      const raw = String(value ?? "");
      const pretty = prettyMath(raw);
      const ascii = pretty.replace(/[Ωω]/g, "omega");
      const loose = ascii.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]+/g, " ").trim();
      return [...new Set([raw, pretty, ascii, loose].map(x => x.toLowerCase()).filter(Boolean))];
    };
    const searchableText = value => searchVariants(value).join(" ");
    const statusLabel = value => ({
      github_found: "已确认",
      checking: "查询中",
      pending: "待处理",
      needs_title_search: "待标题搜索",
      not_found_in_checked_sources: "未找到",
      not_found: "未找到"
    }[value] || value || "待处理");
    const confidenceLabel = value => ({
      high: "高置信",
      medium_multiple_repos_review: "多仓库待复核",
      reviewed_multiple_official_repos: "多官方仓库",
      shared_official_repo: "官方共享仓库",
      needs_deep_review: "候选待复核",
      needs_title_search: "待标题搜索"
    }[value] || value || "未标注");
    const phaseLabel = value => ({
      github_title_search: "GitHub 标题补查",
      multi_repo_review_complete: "多仓库复核完成",
      deep_title_search: "深度标题检索",
      deep_title_search_complete: "深度标题检索完成",
      abstracts_added: "摘要已索引",
      paperid_case_repaired: "论文列表已修复",
      sanitized_complete: "候选仓库已清洗",
      running: "运行中"
    }[value] || value || "运行中");
    const sourceLabel = value => ({
      hongsong_page_direct: "源站直链",
      project_page: "项目页",
      github_search_exact_title_in_readme: "GitHub README 标题",
      github_deep_title_search: "GitHub 深度标题",
      manual_web_verified: "人工核验",
      arxiv_abs_or_html: "arXiv 页面",
      huggingface_papers_arxiv_id: "HF Papers",
      paperswithcode_arxiv_id_official_or_mentioned: "Papers with Code",
      paperswithcode_arxiv_id: "Papers with Code"
    }[value] || value || "-");
    const chip = (label, value) => {
      const numeric = Number(value);
      const display = Number.isFinite(numeric) && String(value).trim() !== "" ? fmt(numeric) : esc(value);
      return `<span class="chip">${label}<strong>${display}</strong></span>`;
    };
    const selectedRenderCount = () => el("renderCount")?.value || "auto";
    const renderCountValue = value => {
      if (value === "all") return Number.POSITIVE_INFINITY;
      const numeric = Number(value);
      if (Number.isFinite(numeric) && numeric > 0) return numeric;
      return window.innerWidth <= 760 ? 60 : 500;
    };
    const baseRenderLimit = () => renderCountValue(selectedRenderCount());
    const renderCountLabel = () => {
      const value = selectedRenderCount();
      if (value === "all") return "全部";
      if (value === "auto") return `${fmt(baseRenderLimit())} 自动`;
      return fmt(baseRenderLimit());
    };
    const maxStar = row => row._maxStar || 0;
    const countBy = (items, key) => items.reduce((acc, item) => {
      const value = item[key] || "";
      acc[value] = (acc[value] || 0) + 1;
      return acc;
    }, {});

    function newestPush(row) {
      return Math.max(0, ...(row.repo_pushed_at || []).map(value => Date.parse(value) || 0));
    }

    function buildIndex(row) {
      const affiliations = row.affiliations || row.affiliation || row.institutions || "";
      const sources = (row.repo_sources || []).flatMap(value => [value, sourceLabel(value)]);
      const common = [
        row.paper_id, row.type, row.title, row.abstract, row.authors, affiliations,
        row.arxiv_id, row.arxiv, row.cvpr_url, row.status, statusLabel(row.status),
        row.confidence, confidenceLabel(row.confidence),
        ...(row.github_repos || []),
        ...(row.repo_descriptions || []),
        ...(row.project_urls || []),
        ...(row.site_direct_repos || []),
        ...(row.hf_repos || []),
        ...(row.pwc_trusted_repos || []),
        ...(row.evidence || []),
        ...(row.review_notes || []),
        ...sources
      ];
      const idx = values => values.flat().map(searchableText).join(" ");
      return {
        all: idx(common),
        title: idx([row.title]),
        abstract: idx([row.abstract]),
        authors: idx([row.authors]),
        affiliations: idx([affiliations]),
        paper_id: String(row.paper_id || "").trim().toLowerCase()
      };
    }

    function prepareRows(data) {
      repoUseCounts = new Map();
      data.forEach(row => {
        (row.github_repos || []).forEach(repo => {
          repoUseCounts.set(repo, (repoUseCounts.get(repo) || 0) + 1);
        });
      });
      rows = data.map(row => {
        row._maxStar = Math.max(0, ...(row.stars || []).map(value => Number(value) || 0));
        row._repoCount = (row.github_repos || []).length;
        row._pushedSort = newestPush(row);
        row._search = buildIndex(row);
        return row;
      });
      updateFilterOptions();
    }

    function setOptions(selectId, allLabel, values, labelFn = value => value) {
      const select = el(selectId);
      const previous = select.value;
      const options = [`<option value="">${allLabel}</option>`].concat(
        Object.entries(values)
          .filter(([value, count]) => value && count > 0)
          .sort(([a], [b]) => String(a).localeCompare(String(b)))
          .map(([value, count]) => `<option value="${esc(value)}">${esc(labelFn(value))} ${fmt(count)}</option>`)
      );
      select.innerHTML = options.join("");
      select.value = [...select.options].some(option => option.value === previous) ? previous : "";
    }

    function updateFilterOptions() {
      setOptions("typeFilter", "全部类型", countBy(rows, "type"));
      setOptions("statusFilter", "全部状态", countBy(rows, "status"), statusLabel);
      setOptions("confidenceFilter", "全部置信度", countBy(rows, "confidence"), confidenceLabel);
      const hasAffiliations = rows.some(row => row.affiliations || row.affiliation || row.institutions);
      const affiliationOption = el("searchScope").querySelector('option[value="affiliations"]');
      if (affiliationOption) affiliationOption.textContent = hasAffiliations ? "单位" : "单位（暂无数据）";
    }

    function queryGroups(queryRaw) {
      if (!queryRaw) return [];
      if (el("searchMode").value === "exact") return [searchVariants(queryRaw)];
      return queryRaw.split(/\s+/).filter(Boolean).map(searchVariants);
    }

    function matchesQuery(row, queryRaw, groups, scope) {
      if (!queryRaw) return true;
      if (scope === "paper_id") return String(row.paper_id || "").trim() === queryRaw.replace(/^#/, "").trim();
      const index = row._search?.[scope] || row._search?.all || "";
      const matchGroup = variants => variants.some(variant => index.includes(variant));
      return el("searchMode").value === "any" ? groups.some(matchGroup) : groups.every(matchGroup);
    }

    function makeSnippet(text, queryRaw) {
      const value = String(text || "");
      if (!value) return "";
      const max = 340;
      const lowered = value.toLowerCase();
      const firstTerm = (queryRaw || "").split(/\s+/).find(Boolean);
      const hit = firstTerm ? lowered.indexOf(firstTerm.toLowerCase()) : -1;
      const start = hit > 80 ? Math.max(0, hit - 90) : 0;
      const snippet = value.slice(start, start + max);
      return `${start > 0 ? "... " : ""}${snippet}${start + max < value.length ? " ..." : ""}`;
    }

    function renderStats() {
      const statusCounts = progress.status_counts || {};
      const confidenceCounts = progress.confidence_counts || {};
      const total = Number(progress.total_papers || rows.length || 0);
      const found = Number(statusCounts.github_found ?? rows.filter(row => row.status === "github_found").length);
      const workTotal = Number(progress.total_work || 0);
      const done = Number(progress.done_work || 0);
      const needsTitleSearch = Number(confidenceCounts.needs_title_search || 0);
      const needsDeepReview = Number(confidenceCounts.needs_deep_review || 0);
      const unresolved = needsTitleSearch + needsDeepReview;
      const remainingToCheck = unresolved || (workTotal ? Math.max(0, workTotal - done) : 0);
      const checked = Math.max(0, total - remainingToCheck);
      el("total").textContent = fmt(total);
      el("checked").textContent = fmt(checked);
      el("remaining").textContent = fmt(remainingToCheck);
      const percent = total ? Math.max(0, Math.min(100, checked * 100 / total)) : 0;
      el("bar").style.width = `${percent}%`;
      document.querySelector(".progressbar").setAttribute("aria-valuenow", String(Math.round(percent)));
      const checkedText = `已核对 · ${fmt(checked)} / ${fmt(total)} · ${percent.toFixed(1)}%`;
      const confirmedText = `强证据确认 GitHub · ${fmt(found)}`;
      const phaseText = `${phaseLabel(progress.phase)} · ${fmt(done)} / ${fmt(workTotal)}`;
      const reviewText = needsDeepReview ? `候选待复核 · ${fmt(needsDeepReview)}` : "";
      el("meta").textContent = window.innerWidth <= 760
        ? checkedText
        : [checkedText, confirmedText, phaseText, reviewText, `更新时间 · ${progress.updated_at || "-"}`].filter(Boolean).join(" | ");
    }

    function progressKey() {
      return [
        progress.updated_at || "",
        progress.phase || "",
        progress.message || "",
        progress.done_work || "",
        progress.total_work || "",
        progress.total_papers || "",
        progress.github_api_done || "",
        progress.unique_repos_seen || "",
        JSON.stringify(progress.status_counts || {})
      ].join("|");
    }

    function resultsKey() {
      return [
        progress.total_papers || "",
        progress.unique_repos_seen || "",
        JSON.stringify(progress.status_counts || {})
      ].join("|");
    }

    function renderStatsIfChanged(force = false) {
      const key = progressKey();
      if (force || key !== lastProgressKey) {
        lastProgressKey = key;
        renderStats();
      }
    }

    function currentSignature() {
      return [
        el("filter").value.trim(),
        el("searchScope").value,
        el("searchMode").value,
        el("sort").value,
        el("typeFilter").value,
        el("statusFilter").value,
        el("confidenceFilter").value,
        selectedRenderCount(),
        baseRenderLimit()
      ].join("|");
    }

    function renderTable() {
      if (!rows.length) return;
      const signature = currentSignature();
      if (signature !== lastViewSignature) {
        renderLimit = baseRenderLimit();
        lastViewSignature = signature;
      }
      const queryRaw = el("filter").value.trim();
      const groups = queryGroups(queryRaw);
      const searchScope = el("searchScope").value;
      const status = el("statusFilter").value;
      const type = el("typeFilter").value;
      const confidence = el("confidenceFilter").value;
      const visible = [];
      const stats = { found: 0, oral: 0, poster: 0 };
      for (const row of rows) {
        if (status && row.status !== status) continue;
        if (type && row.type !== type) continue;
        if (confidence && row.confidence !== confidence) continue;
        if (!matchesQuery(row, queryRaw, groups, searchScope)) continue;
        visible.push(row);
        if (row.status === "github_found") stats.found += 1;
        if (row.type === "Oral") stats.oral += 1;
        if (row.type === "Poster") stats.poster += 1;
      }
      const sort = el("sort").value;
      visible.sort((a, b) => {
        if (sort === "title") return (a.title || "").localeCompare(b.title || "");
        if (sort === "stars_desc") return maxStar(b) - maxStar(a) || Number(a.paper_id) - Number(b.paper_id);
        if (sort === "stars_asc") return (maxStar(a) || Infinity) - (maxStar(b) || Infinity) || Number(a.paper_id) - Number(b.paper_id);
        if (sort === "status") return (a.status || "").localeCompare(b.status || "") || Number(a.paper_id) - Number(b.paper_id);
        if (sort === "type") return (a.type || "").localeCompare(b.type || "") || Number(a.paper_id) - Number(b.paper_id);
        if (sort === "repo_count") return (b._repoCount || 0) - (a._repoCount || 0) || Number(a.paper_id) - Number(b.paper_id);
        if (sort === "pushed_desc") return (b._pushedSort || 0) - (a._pushedSort || 0) || Number(a.paper_id) - Number(b.paper_id);
        return Number(a.paper_id) - Number(b.paper_id);
      });
      const sample = visible.slice(0, renderLimit);
      el("visibleStats").innerHTML = [
        chip("命中", visible.length),
        chip("显示", renderCountLabel()),
        chip("已确认", stats.found),
        chip("Oral", stats.oral),
        chip("Poster", stats.poster),
        sample.length < visible.length ? chip("已渲染", sample.length) : ""
      ].join("");
      if (!sample.length) {
        el("body").innerHTML = `<tr><td colspan="5" class="dim moreRow">没有匹配结果。可以清空筛选或切换搜索范围。</td></tr>`;
        return;
      }
      el("body").innerHTML = sample.map(row => {
        const repos = row.github_repos || [];
        const stars = row.stars || [];
        const sources = row.repo_sources || [];
        const repoHtml = repos.length ? repos.map((repo, i) => {
          const reuse = repoUseCounts.get(repo) || 0;
          const source = `${sourceLabel(sources[i])}${row.repo_is_fork?.[i] === "True" ? " · fork" : ""}${reuse > 1 ? ` · 复用${reuse}篇` : ""}`;
          return `<div class="repoItem"><a href="${esc(repo)}" target="_blank" rel="noopener">${esc(repo.replace("https://github.com/", ""))}</a><span class="repoStars">${fmt(stars[i] || 0)}</span><span class="repoSource">${esc(source)}</span></div>`;
        }).join("") : "<span class='dim'>-</span>";
        const titleText = prettyMath(row.title || "");
        const cvpr = row.cvpr_url ? `<a href="${esc(row.cvpr_url)}" target="_blank" rel="noopener">${esc(titleText)}</a>` : esc(titleText);
        const abstractHtml = row.abstract ? `<details class="abstract"><summary>摘要</summary><div>${esc(makeSnippet(row.abstract, queryRaw))}</div></details>` : "";
        const reviewNote = (row.review_notes || [])[0];
        const reviewHtml = reviewNote ? `<div class="reviewNote small">${esc(reviewNote)}</div>` : "";
        const typeText = row.type || "-";
        const typeClass = typeText.toLowerCase() === "oral" ? "oral" : (typeText.toLowerCase() === "poster" ? "poster" : "");
        return `<tr>
          <td class="pid" data-label="ID">${esc(row.paper_id || "")}</td>
          <td class="paperType" data-label="类型"><span class="badge ${typeClass}">${esc(typeText)}</span></td>
          <td class="title" data-label="标题">${cvpr}<div class="dim small">${esc(row.authors || "")}</div>${abstractHtml}</td>
          <td class="status" data-label="状态"><span class="badge ${row.status || "pending"}">${esc(statusLabel(row.status))}</span><div class="dim small">${esc(confidenceLabel(row.confidence))}</div>${reviewHtml}</td>
          <td class="repo" data-label="GitHub / Stars / 证据源">${repoHtml}</td>
        </tr>`;
      }).join("");
      if (sample.length < visible.length) {
        el("body").insertAdjacentHTML("beforeend", `<tr><td colspan="5" class="moreRow"><button id="showMoreRows" class="secondary" type="button">显示更多 ${fmt(Math.min(baseRenderLimit(), visible.length - sample.length))} 条</button></td></tr>`);
      }
    }

    async function load(force = false) {
      if (loading || (document.hidden && !force)) return;
      loading = true;
      const stamp = Date.now();
      try {
        const p = await fetch(`progress.json?ts=${stamp}`);
        if (p.ok) progress = await p.json();
        const resultKey = resultsKey();
        const resultsChanged = resultKey !== lastResultsKey;
        const resultsStale = Date.now() - lastResultsFetchAt > RESULT_REFRESH_MS;
        const shouldFetchResults = force || !rows.length || resultsChanged || resultsStale;
        let refreshedResults = false;
        if (shouldFetchResults) {
          const r = await fetch(`results_live.json?ts=${stamp}`);
          if (r.ok) {
            prepareRows(await r.json());
            lastResultsKey = resultKey;
            lastResultsFetchAt = Date.now();
            renderStatsIfChanged(true);
            renderTable();
            refreshedResults = true;
          }
        }
        if (!refreshedResults) {
          renderStatsIfChanged();
        }
      } catch (err) {
        el("meta").textContent = `等待 HTTP 服务或结果文件: ${err}`;
      } finally {
        loading = false;
      }
    }

    function scheduleRender() {
      clearTimeout(filterTimer);
      filterTimer = setTimeout(renderTable, 180);
    }

    el("filter").addEventListener("input", scheduleRender);
    ["searchScope", "searchMode", "sort", "typeFilter", "statusFilter", "confidenceFilter"].forEach(id => el(id).addEventListener("input", renderTable));
    el("renderCount").addEventListener("input", () => {
      localStorage.setItem(RENDER_LIMIT_KEY, el("renderCount").value);
      renderLimit = baseRenderLimit();
      lastViewSignature = "";
      renderTable();
    });
    el("refresh").addEventListener("click", () => load(true));
    el("clearFilters").addEventListener("click", () => {
      ["filter", "searchScope", "searchMode", "sort", "typeFilter", "statusFilter", "confidenceFilter"].forEach(id => {
        if (id === "searchScope") el(id).value = "all";
        else if (id === "searchMode") el(id).value = "all";
        else if (id === "sort") el(id).value = "paper_id";
        else el(id).value = "";
      });
      renderTable();
    });
    function initFromUrl() {
      const params = new URLSearchParams(location.search);
      if (params.has("q")) el("filter").value = params.get("q") || "";
      if (params.has("scope")) el("searchScope").value = params.get("scope") || "all";
      if (params.has("mode")) el("searchMode").value = params.get("mode") || "all";
      if (params.has("sort")) el("sort").value = params.get("sort") || "paper_id";
      if (params.has("type")) el("typeFilter").value = params.get("type") || "";
      if (params.has("status")) el("statusFilter").value = params.get("status") || "";
      if (params.has("confidence")) el("confidenceFilter").value = params.get("confidence") || "";
    }
    function initRenderCount() {
      const saved = localStorage.getItem(RENDER_LIMIT_KEY);
      const allowed = [...el("renderCount").options].map(option => option.value);
      const params = new URLSearchParams(location.search);
      const requested = params.get("render");
      const next = requested || saved || "auto";
      el("renderCount").value = allowed.includes(next) ? next : "auto";
    }
    document.addEventListener("click", event => {
      if (event.target?.id === "showMoreRows") {
        renderLimit += baseRenderLimit();
        renderTable();
      }
    });
    window.addEventListener("resize", scheduleRender);
    document.addEventListener("visibilitychange", () => { if (!document.hidden) load(false); });
    initFromUrl();
    initRenderCount();
    load(true);
    pollTimer = setInterval(() => load(false), POLL_MS);
    window.addEventListener("pagehide", () => clearInterval(pollTimer));
  </script>
</body>
</html>
